  <text x="72" y="462" fill="#fff8ff" font-size="31" font-family="Segoe UI, Arial" font-weight="900">Quartz Quester</text>
  <text x="60" y="496" fill="rgba(255,248,255,.76)" font-size="15" font-family="Segoe UI, Arial">Gold day · 410 XP · 12 day streak</text>
  <rect x="50" y="540" width="132" height="84" rx="24" fill="rgba(255,255,255,.13)"/>
