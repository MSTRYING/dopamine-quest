      <stop stop-color="#160718"/>
      <stop offset=".48" stop-color="#4d246f"/>
      <stop offset="1" stop-color="#090b18"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f8d66d"/>
      <stop offset=".45" stop-color="#b890ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="20"/></filter>
